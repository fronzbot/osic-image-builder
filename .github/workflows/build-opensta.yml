name: Build OpenSTA AppImage

# This allows you to trigger the build manually from the GitHub Actions tab
on: 
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-latest # This guarantees an x86_64 Linux environment
    container: almalinux:8

    steps:
      - name: Install Build Dependencies
        run: |
          dnf update -y
          dnf install -y epel-release dnf-plugins-core
          dnf config-manager --set-enabled powertools
          dnf clean all
          dnf makecache
          dnf install -y --enablerepo=powertools --enablerepo=epel \
            gcc-toolset-11 gcc-toolset-11-gcc-c++ \
            cmake make swig tcl-devel zlib-devel bison m4 \
            flex flex-devel tcl-tclreadline tcl-tclreadline-devel \
            readline-devel wget file git

      - name: Clone OpenSTA Source
        run: |
          git clone https://github.com/parallaxsw/OpenSTA.git
          
      - name: Clone Cudd Releases
        run: |
          git clone https://github.com/davidkebo/cudd.git
          cp cudd/cudd_versions/cudd-3.0.0.tar.gz ./
          tar -xzvf cudd-3.0.0.tar.gz
          
      - name: Install Modern Bison from Source
        run: |
          source /opt/rh/gcc-toolset-11/enable
          
          # Download and extract Bison 3.8.2
          wget https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.gz
          tar -xf bison-3.8.2.tar.gz
          cd bison-3.8.2
          
          # Configure and install to /usr/local
          ./configure --prefix=/usr/local
          make -j2
          make install
          
      - name: Install Modern Eigen3 from Source
        run: |
          # Activate GCC 11 for THIS specific shell session
          source /opt/rh/gcc-toolset-11/enable
          
          # Clone the stable 3.4.0 release
          git clone --branch 3.4.0 https://gitlab.com/libeigen/eigen.git
          cd eigen
          mkdir build && cd build
          
          # Now CMake will easily find the CXX compiler
          cmake ..
          make install

      - name: Build Cudd
        run: |
          source /opt/rh/gcc-toolset-11/enable
          cd cudd-3.0.0
          ./configure
          make

      - name: Build OpenSTA
        run: |
          cd OpenSTA
          source /opt/rh/gcc-toolset-11/enable
          mkdir build && cd build
          cmake .. -DCUDD_LIB=../../cudd-3.0.0/cudd/.libs/libcudd.a
          make

      - name: Prepare AppDir Structure
        run: |
          mkdir -p AppDir/usr/bin
          cp OpenSTA/build/sta AppDir/usr/bin/

          # CRITICAL FIX: Copy the Tcl initialization scripts into the AppDir
          mkdir -p AppDir/usr/share
          cp -r /usr/share/tcl8.6 AppDir/usr/share/

          cat > AppDir/opensta.desktop <<EOF
          [Desktop Entry]
          Name=OpenSTA
          Exec=sta
          Icon=utilities-terminal
          Type=Application
          Categories=Development;
          EOF

          touch AppDir/utilities-terminal.svg

      - name: Bundle Libraries and Package AppImage
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage appimagetool*.AppImage

          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-tool
          
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-tool

          # Run linuxdeploy to bundle the .so libraries
          ./linuxdeploy-tool/AppRun --appdir AppDir \
            -e AppDir/usr/bin/sta \
            -d AppDir/opensta.desktop \
            -i AppDir/utilities-terminal.svg
          
          # CRITICAL FIX: Delete the default symlink and create a custom wrapper script
          rm -f AppDir/AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          # Get the directory where the AppImage is currently mounted
          HERE="$(dirname "$(readlink -f "${0}")")"
          # Tell Tcl to look inside the AppImage for init.tcl
          export TCL_LIBRARY="${HERE}/usr/share/tcl8.6"
          # Execute the actual OpenSTA binary and pass along any command line arguments
          exec "${HERE}/usr/bin/sta" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Package the final AppImage
          export ARCH=x86_64
          ./appimagetool-tool/AppRun AppDir OpenSTA-RHEL8-x86_64.AppImage

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSTA-AppImage
          path: OpenSTA-RHEL8-x86_64.AppImage
          retention-days: 7 # Keeps the file available for download for a week
