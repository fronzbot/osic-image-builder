name: Build slang AppImage

# This allows you to trigger the build manually from the GitHub Actions tab
on: 
  workflow_dispatch:
  
jobs:
  build-appimage:
    runs-on: ubuntu-latest # This guarantees an x86_64 Linux environment
    container: almalinux:8

    steps:
      - name: Install Build Dependencies
        run: |
          dnf update -y
          dnf install -y epel-release dnf-plugins-core
          dnf config-manager --set-enabled powertools
          dnf clean all
          dnf makecache
          dnf install -y --enablerepo=powertools --enablerepo=epel \
            gcc-toolset-11 gcc-toolset-11-gcc-c++ \
            cmake make wget file git
            
      - name: Clone slang Source
        run: |
          git clone https://github.com/MikePopoloski/slang.git
          
      - name: Build slang
        run: |
          source /opt/rh/gcc-toolset-11/enable
          cd slang
          cmake -B build
          cmake --build build -j2
          pwd
          ls -lah ./build
          find . -name slang

      - name: Prepare AppDir Structure
        run: |
          mkdir -p AppDir/usr/bin
          # Copy the compiled binary into the AppDir
          cp slang/build/bin/slang AppDir/usr/bin/

          # Create the required .desktop file
          cat > AppDir/slang.desktop <<EOF
          [Desktop Entry]
          Name=slang
          Exec=slang
          Icon=utilities-terminal
          Type=Application
          Categories=Development;
          EOF

          # Create a dummy icon file (required by linuxdeploy)
          touch AppDir/utilities-terminal.svg

      - name: Bundle Libraries and Package AppImage
        run: |
          # 1. Download tools
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage appimagetool*.AppImage

          # 2. Extract tools to bypass Docker FUSE block
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-tool
          
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-tool

          # 3. FORCE linuxdeploy to create the AppRun wrapper and bundle libraries!
          ./linuxdeploy-tool/AppRun --appdir AppDir \
            -e AppDir/usr/bin/slang \
            -d AppDir/slang.desktop \
            -i AppDir/utilities-terminal.svg
          
          # 4. Package the final AppImage
          export ARCH=x86_64
          ./appimagetool-tool/AppRun AppDir slang-RHEL8-x86_64.AppImage

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slang-AppImage
          path: slang-RHEL8-x86_64.AppImage
          retention-days: 7 # Keeps the file available for download for a week
